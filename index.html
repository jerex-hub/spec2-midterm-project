<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Rock x Paper x Scissors</h1>

      <div class="choices">
        <button class="btn" onclick="play('rock')">🪨</button>
        <button class="btn" onclick="play('paper')">📄</button>
        <button class="btn" onclick="play('scissors')">✂️</button>
      </div>

      <div class="result" id="result">Make your move!</div>

      <div class="score">
        <span> You: <span id="userScore">0</span></span>
        <span> Bot: <span id="botScore">0</span></span>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
