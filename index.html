<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-blobs"><span></span><span></span><span></span></div>

    <div class="container">
      <h1>Rock Paper Scissors Game</h1>

      <div class="arena">
        <div class="player">
          <p>You</p>
          <div id="playerPick" class="pick">?</div>
        </div>
        <div class="vs" id="countdown">VS</div>
        <div class="player">
          <p>Bot</p>
          <div id="botPick" class="pick">?</div>
        </div>
      </div>

      <div class="choices">
        <button class="btn rock" onclick="startRound('rock')">🪨</button>
        <button class="btn paper" onclick="startRound('paper')">📄</button>
        <button class="btn scissors" onclick="startRound('scissors')">
          ✂️
        </button>
      </div>

      <div class="result" id="result">Click to start!</div>

      <div class="score">
        <div>👤 <span id="userScore">0</span></div>
        <div>🤖 <span id="botScore">0</span></div>
      </div>

      <button class="reset" onclick="resetGame()">Reset Game</button>
    </div>

    <audio
      id="winSound"
      src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"
    ></audio>
    <audio
      id="loseSound"
      src="https://assets.mixkit.co/active_storage/sfx/270/270-preview.mp3"
    ></audio>

    <script src="script.js"></script>
  </body>
</html>
